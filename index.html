<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ワードウルフ進行画面</title>
  <style>
    :root {
      --blue: #1e63ff;
      --blue-dark: #174dcc;
      --bg: #f5f7fb;
      --text: #1f2937;
      --card: #ffffff;
      --border: #d9e0ee;
      --danger: #e11d48;
      --green: #16a34a;
      --green-dark: #15803d;
      --gray-btn: #eef2f7;
      --gray-text: #475569;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .app {
      width: min(980px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
      padding: 28px;
      position: relative;
    }

    .hidden {
      display: none !important;
    }

    h1 {
      margin: 0 0 20px;
      text-align: center;
      font-size: clamp(28px, 4vw, 40px);
    }

    .setup-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
      margin-bottom: 28px;
    }

    .field {
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      background: #fbfcff;
    }

    .field label {
      display: block;
      font-weight: 700;
      margin-bottom: 10px;
      font-size: 18px;
    }

    .field select {
      width: 100%;
      padding: 12px 14px;
      font-size: 18px;
      border-radius: 12px;
      border: 1px solid #c9d3e6;
      background: white;
    }

    .bottom-bar,
    .center-row,
    .restart {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .btn {
      border: none;
      border-radius: 18px;
      padding: 16px 28px;
      font-size: 24px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease, background 0.15s ease;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    .btn-primary {
      background: var(--blue);
      color: white;
    }

    .btn-primary:hover:enabled {
      background: var(--blue-dark);
    }

    .btn-sub {
      background: #eef3ff;
      color: var(--blue-dark);
    }

    .btn-sub:hover:enabled {
      background: #dfe8ff;
    }

    .btn-green {
      background: var(--green);
      color: white;
    }

    .btn-green:hover:enabled {
      background: var(--green-dark);
    }

    .btn-gray {
      background: var(--gray-btn);
      color: var(--gray-text);
    }

    .btn-gray:hover:enabled {
      background: #dde5ef;
    }

    .btn-large {
      width: min(620px, 100%);
      min-height: 120px;
      font-size: clamp(30px, 5vw, 48px);
      border-radius: 28px;
      background: var(--blue);
      color: white;
      display: block;
      margin: 24px auto 0;
      box-shadow: 0 14px 30px rgba(30, 99, 255, 0.25);
    }

    .btn-player {
      min-width: 180px;
      font-size: 24px;
      padding: 18px 22px;
    }

    .btn-small {
      font-size: 16px;
      padding: 10px 18px;
      border-radius: 12px;
    }

    .screen {
      min-height: 620px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .center-box {
      text-align: center;
    }

    .word-card,
    .result-card,
    .confirm-card,
    .announce-card {
      margin: 0 auto;
      width: min(760px, 100%);
      border-radius: 28px;
      background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
      border: 2px solid #d6e1ff;
      padding: 32px 24px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    .word {
      font-size: clamp(42px, 7vw, 72px);
      font-weight: 900;
      letter-spacing: 0.04em;
    }

    .discussion-title {
      font-size: clamp(34px, 6vw, 64px);
      font-weight: 900;
      color: var(--danger);
      text-align: center;
      margin-bottom: 20px;
      letter-spacing: 0.04em;
    }

    .timer {
      text-align: center;
      font-size: clamp(80px, 14vw, 160px);
      font-weight: 900;
      line-height: 1;
      color: var(--blue);
      margin: 10px 0 24px;
      font-variant-numeric: tabular-nums;
    }

    .timer.is-finish {
      color: var(--danger);
      animation: pulse 0.8s ease infinite;
    }

    .vote-title,
    .confirm-title,
    .result-title {
      text-align: center;
      font-size: clamp(30px, 5vw, 50px);
      font-weight: 900;
      margin-bottom: 24px;
    }

    .announce-main,
    .result-main {
      font-size: clamp(34px, 6vw, 58px);
      font-weight: 900;
      line-height: 1.5;
      white-space: pre-line;
    }

    .result-main {
      margin-bottom: 18px;
    }

    .player-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 14px;
      width: min(800px, 100%);
      margin: 0 auto;
    }

    .result-sub {
      font-size: 22px;
      color: #475569;
      line-height: 1.8;
      white-space: pre-line;
    }

    .answers-box {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 2px dashed #cbd5e1;
      font-size: 22px;
      line-height: 2;
      white-space: pre-line;
    }

    .wolf-word {
      color: #1e63ff;
      font-weight: 900;
    }

    .lock-overlay {
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0);
      z-index: 999;
      pointer-events: auto;
      border-radius: 24px;
    }

    .lock-message {
      margin-top: 12px;
      font-size: 20px;
      font-weight: 700;
      color: #111111;
      min-height: 30px;
      font-variant-numeric: tabular-nums;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.03);
      }
      100% {
        transform: scale(1);
      }
    }

    @media (max-width: 640px) {
      .app {
        padding: 18px;
      }

      .screen {
        min-height: 78vh;
      }

      .btn {
        font-size: 20px;
      }

      .btn-small {
        font-size: 15px;
      }

      .lock-message {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <audio id="alarmAudio" preload="auto" src="timer.mp3"></audio>
    <div id="lockOverlay" class="lock-overlay hidden"></div>

    <section id="setupScreen" class="screen">
      <h1>ワードウルフ進行画面</h1>

      <div class="setup-grid">
        <div class="field">
          <label for="playerCount">プレイ人数</label>
          <select id="playerCount"></select>
        </div>

        <div class="field">
          <label for="wolfCount">ウルフの数</label>
          <select id="wolfCount"></select>
        </div>

        <div class="field">
          <label for="themeNumber">お題番号（1〜10）</label>
          <select id="themeNumber"></select>
        </div>

        <div class="field">
          <label for="timeLimit">議論時間</label>
          <select id="timeLimit"></select>
        </div>
      </div>

      <div class="bottom-bar">
        <button class="btn btn-primary" id="startBtn">スタート</button>
      </div>
    </section>

    <section id="turnScreen" class="screen hidden">
      <div class="center-box">
        <button class="btn btn-large" id="revealBtn"></button>
        <div class="lock-message" id="revealLockMessage"></div>
      </div>
    </section>

    <section id="wordScreen" class="screen hidden">
      <div class="center-box">
        <div class="word-card">
          <div class="word" id="wordText"></div>
        </div>
        <div class="center-row">
          <button class="btn btn-sub" id="doneBtn">見終わりました</button>
        </div>
        <div class="lock-message" id="doneLockMessage"></div>
      </div>
    </section>

    <section id="discussionScreen" class="screen hidden">
      <div class="center-box">
        <div class="discussion-title">議論してください</div>
        <div class="timer" id="timerText">03:00</div>
        <div class="center-row">
          <button class="btn btn-gray btn-small" id="endDiscussionBtn">議論を終わる</button>
        </div>
      </div>
    </section>

    <section id="voteScreen" class="screen hidden">
      <div class="center-box">
        <div class="vote-title">誰が最多票になった？</div>
        <div class="player-grid" id="voteButtons"></div>
      </div>
    </section>

    <section id="confirmScreen" class="screen hidden">
      <div class="confirm-card">
        <div class="confirm-title" id="confirmTitle"></div>
        <div class="center-row">
          <button class="btn btn-green" id="confirmYesBtn">はい</button>
          <button class="btn btn-gray" id="confirmNoBtn">いいえ</button>
        </div>
      </div>
    </section>

    <section id="announceScreen" class="screen hidden">
      <div class="announce-card">
        <div class="announce-main" id="announceMain"></div>
        <div class="center-row">
          <button class="btn btn-primary" id="announceNextBtn">次へ</button>
        </div>
      </div>
    </section>

    <section id="resultScreen" class="screen hidden">
      <div class="result-card">
        <div class="result-title" id="resultTitle">結果</div>
        <div class="result-main" id="resultMain"></div>
        <div class="result-sub" id="resultSub"></div>
        <div class="answers-box hidden" id="answersBox"></div>

        <div class="restart hidden" id="retryRow">
          <button class="btn btn-primary" id="retryBtn">もう一度</button>
        </div>
      </div>
    </section>
  </div>

  <script>
    const themes = {
      1: { citizen: "たこ", wolf: "いか" },
      2: { citizen: "うし", wolf: "バッファロー" },
      3: { citizen: "ねこ", wolf: "とら" },
      4: { citizen: "コーヒー", wolf: "紅茶" },
      5: { citizen: "春", wolf: "秋" },
      6: { citizen: "映画", wolf: "ドラマ" },
      7: { citizen: "海", wolf: "プール" },
      8: { citizen: "電車", wolf: "バス" },
      9: { citizen: "ケーキ", wolf: "プリン" },
      10: { citizen: "犬", wolf: "狼" }
    };

    const playerCountEl = document.getElementById("playerCount");
    const wolfCountEl = document.getElementById("wolfCount");
    const themeNumberEl = document.getElementById("themeNumber");
    const timeLimitEl = document.getElementById("timeLimit");

    const setupScreen = document.getElementById("setupScreen");
    const turnScreen = document.getElementById("turnScreen");
    const wordScreen = document.getElementById("wordScreen");
    const discussionScreen = document.getElementById("discussionScreen");
    const voteScreen = document.getElementById("voteScreen");
    const confirmScreen = document.getElementById("confirmScreen");
    const announceScreen = document.getElementById("announceScreen");
    const resultScreen = document.getElementById("resultScreen");

    const startBtn = document.getElementById("startBtn");
    const revealBtn = document.getElementById("revealBtn");
    const doneBtn = document.getElementById("doneBtn");
    const endDiscussionBtn = document.getElementById("endDiscussionBtn");
    const confirmYesBtn = document.getElementById("confirmYesBtn");
    const confirmNoBtn = document.getElementById("confirmNoBtn");
    const announceNextBtn = document.getElementById("announceNextBtn");
    const retryBtn = document.getElementById("retryBtn");

    const wordText = document.getElementById("wordText");
    const timerText = document.getElementById("timerText");
    const voteButtons = document.getElementById("voteButtons");
    const confirmTitle = document.getElementById("confirmTitle");
    const announceMain = document.getElementById("announceMain");
    const resultTitle = document.getElementById("resultTitle");
    const resultMain = document.getElementById("resultMain");
    const resultSub = document.getElementById("resultSub");
    const answersBox = document.getElementById("answersBox");
    const retryRow = document.getElementById("retryRow");
    const alarmAudio = document.getElementById("alarmAudio");
    const lockOverlay = document.getElementById("lockOverlay");
    const revealLockMessage = document.getElementById("revealLockMessage");
    const doneLockMessage = document.getElementById("doneLockMessage");

    const state = {
      playerCount: 4,
      wolfCount: 1,
      themeNumber: 1,
      timeLimitMinutes: 3,
      roles: [],
      currentPlayerIndex: 0,
      selectedPlayerIndex: null,
      countdownSeconds: 180,
      timerId: null,
      lockTimeoutId: null,
      lockIntervalId: null,
      lockTarget: null
    };

    function fillSelect(select, start, end, selectedValue) {
      select.innerHTML = "";
      for (let i = start; i <= end; i++) {
        const option = document.createElement("option");
        option.value = String(i);
        option.textContent = String(i);
        if (i === selectedValue) option.selected = true;
        select.appendChild(option);
      }
    }

    function fillTimeSelect() {
      timeLimitEl.innerHTML = "";
      [2, 3, 4, 5, 6, 7].forEach(min => {
        const option = document.createElement("option");
        option.value = String(min);
        option.textContent = `${min}分`;
        if (min === 3) option.selected = true;
        timeLimitEl.appendChild(option);
      });
    }

    function initSelectors() {
      fillSelect(playerCountEl, 3, 12, 4);
      fillSelect(wolfCountEl, 1, 3, 1);
      fillSelect(themeNumberEl, 1, 10, 1);
      fillTimeSelect();
      updateWolfOptions();
    }

    function updateWolfOptions() {
      const players = Number(playerCountEl.value);
      const maxWolf = Math.max(1, players - 1);
      const currentWolf = Math.min(Number(wolfCountEl.value), maxWolf);
      fillSelect(wolfCountEl, 1, maxWolf, currentWolf);
    }

    function shuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function createRoles(playerCount, wolfCount) {
      const roles = [];
      for (let i = 0; i < wolfCount; i++) roles.push("wolf");
      for (let i = 0; i < playerCount - wolfCount; i++) roles.push("citizen");
      return shuffle(roles);
    }

    function showScreen(screen) {
      [
        setupScreen,
        turnScreen,
        wordScreen,
        discussionScreen,
        voteScreen,
        confirmScreen,
        announceScreen,
        resultScreen
      ].forEach(el => el.classList.add("hidden"));
      screen.classList.remove("hidden");
    }

    function formatTime(seconds) {
      const min = Math.floor(seconds / 60);
      const sec = seconds % 60;
      return `${String(min).padStart(2, "0")}:${String(sec).padStart(2, "0")}`;
    }

    function updateTimerText() {
      timerText.textContent = formatTime(state.countdownSeconds);
    }

    function clearTimer() {
      if (state.timerId) {
        clearInterval(state.timerId);
        state.timerId = null;
      }
    }

    function clearLockMessages() {
      revealLockMessage.textContent = "";
      doneLockMessage.textContent = "";
    }

    function clearLock() {
      if (state.lockTimeoutId) {
        clearTimeout(state.lockTimeoutId);
        state.lockTimeoutId = null;
      }
      if (state.lockIntervalId) {
        clearInterval(state.lockIntervalId);
        state.lockIntervalId = null;
      }
      lockOverlay.classList.add("hidden");
      revealBtn.disabled = false;
      doneBtn.disabled = false;
      state.lockTarget = null;
      clearLockMessages();
    }

    function setLockMessage(target, secondsLeft) {
      const text = `まだ押せません。${formatTime(secondsLeft)}`;
      if (target === "reveal") {
        revealLockMessage.textContent = text;
      } else if (target === "done") {
        doneLockMessage.textContent = text;
      }
    }

    function lockScreenWithCount(disabledButton, targetName) {
      clearLock();

      let secondsLeft = 3;

      state.lockTarget = targetName;
      lockOverlay.classList.remove("hidden");
      disabledButton.disabled = true;
      setLockMessage(targetName, secondsLeft);

      state.lockIntervalId = setInterval(() => {
        secondsLeft -= 1;
        if (secondsLeft >= 0) {
          setLockMessage(targetName, secondsLeft);
        }
      }, 1000);

      state.lockTimeoutId = setTimeout(() => {
        clearLock();
      }, 4000);
    }

    function playAlarm() {
      try {
        alarmAudio.currentTime = 0;
        alarmAudio.play();
      } catch (e) {
        console.log("音声を再生できませんでした。", e);
      }
    }

    function startGame() {
      clearTimer();
      clearLock();
      timerText.classList.remove("is-finish");

      state.playerCount = Number(playerCountEl.value);
      state.wolfCount = Number(wolfCountEl.value);
      state.themeNumber = Number(themeNumberEl.value);
      state.timeLimitMinutes = Number(timeLimitEl.value);
      state.roles = createRoles(state.playerCount, state.wolfCount);
      state.currentPlayerIndex = 0;
      state.selectedPlayerIndex = null;
      state.countdownSeconds = state.timeLimitMinutes * 60;

      answersBox.classList.add("hidden");
      retryRow.classList.add("hidden");
      answersBox.innerHTML = "";
      resultMain.textContent = "";
      resultSub.textContent = "";
      announceMain.textContent = "";
      resultTitle.textContent = "結果";

      updateTurnButton();
      showScreen(turnScreen);
    }

    function updateTurnButton() {
      const playerNumber = state.currentPlayerIndex + 1;
      revealBtn.textContent = `${playerNumber}人目ですか。`;
    }

    function revealWord() {
      const theme = themes[state.themeNumber];
      const role = state.roles[state.currentPlayerIndex];
      wordText.textContent = role === "wolf" ? theme.wolf : theme.citizen;
      showScreen(wordScreen);
      lockScreenWithCount(doneBtn, "done");
    }

    function nextPlayer() {
      state.currentPlayerIndex += 1;

      if (state.currentPlayerIndex >= state.playerCount) {
        startDiscussion();
        return;
      }

      updateTurnButton();
      showScreen(turnScreen);
      lockScreenWithCount(revealBtn, "reveal");
    }

    function startDiscussion() {
      state.countdownSeconds = state.timeLimitMinutes * 60;
      timerText.classList.remove("is-finish");
      updateTimerText();
      showScreen(discussionScreen);

      clearTimer();
      state.timerId = setInterval(() => {
        state.countdownSeconds -= 1;

        if (state.countdownSeconds <= 0) {
          state.countdownSeconds = 0;
          updateTimerText();
          timerText.classList.add("is-finish");
          clearTimer();
          playAlarm();
          openVoteScreen();
          return;
        }

        updateTimerText();
      }, 1000);
    }

    function openVoteScreen() {
      clearTimer();
      renderVoteButtons();
      showScreen(voteScreen);
    }

    function renderVoteButtons() {
      voteButtons.innerHTML = "";
      for (let i = 0; i < state.playerCount; i++) {
        const button = document.createElement("button");
        button.className = "btn btn-primary btn-player";
        button.textContent = `${i + 1}人目`;
        button.addEventListener("click", () => {
          state.selectedPlayerIndex = i;
          confirmTitle.textContent = `${i + 1}人目が最多票で合ってますか？`;
          showScreen(confirmScreen);
        });
        voteButtons.appendChild(button);
      }
    }

    function buildAnswerHtml() {
      const theme = themes[state.themeNumber];
      const lines = [];

      for (let i = 0; i < state.playerCount; i++) {
        const role = state.roles[i];
        const word = role === "wolf"
          ? `<span class="wolf-word">${theme.wolf}</span>`
          : theme.citizen;

        lines.push(`${i + 1}人目：${word}`);
      }

      return lines.join("<br>");
    }

    function showWolfAnswersScreen() {
      resultTitle.textContent = "結果";
      resultMain.textContent = "";
      resultSub.textContent = "";
      answersBox.innerHTML = buildAnswerHtml();
      answersBox.classList.remove("hidden");
      retryRow.classList.remove("hidden");
      showScreen(resultScreen);
    }

    function showResult() {
      const selected = state.selectedPlayerIndex;
      const isWolf = state.roles[selected] === "wolf";

      answersBox.classList.add("hidden");
      retryRow.classList.add("hidden");
      answersBox.innerHTML = "";

      if (!isWolf) {
        resultTitle.textContent = "結果";
        resultMain.textContent = "市民の負け～";
        resultSub.textContent = "";
        answersBox.innerHTML = buildAnswerHtml();
        answersBox.classList.remove("hidden");
        retryRow.classList.remove("hidden");
        showScreen(resultScreen);
      } else {
        announceMain.textContent = `${selected + 1}人目はウルフです！\n逆転チャンス！！`;
        showScreen(announceScreen);
      }
    }

    function resetGame() {
      clearTimer();
      clearLock();

      state.roles = [];
      state.currentPlayerIndex = 0;
      state.selectedPlayerIndex = null;
      state.countdownSeconds = Number(timeLimitEl.value || 3) * 60;

      answersBox.classList.add("hidden");
      retryRow.classList.add("hidden");
      answersBox.innerHTML = "";
      resultMain.textContent = "";
      resultSub.textContent = "";
      announceMain.textContent = "";
      timerText.classList.remove("is-finish");

      showScreen(setupScreen);
    }

    playerCountEl.addEventListener("change", updateWolfOptions);
    startBtn.addEventListener("click", startGame);
    revealBtn.addEventListener("click", revealWord);
    doneBtn.addEventListener("click", nextPlayer);
    endDiscussionBtn.addEventListener("click", openVoteScreen);
    confirmYesBtn.addEventListener("click", showResult);
    confirmNoBtn.addEventListener("click", () => showScreen(voteScreen));
    announceNextBtn.addEventListener("click", showWolfAnswersScreen);
    retryBtn.addEventListener("click", resetGame);

    initSelectors();
  </script>
</body>
</html>
